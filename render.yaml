services:
  - type: web
    name: volunteeriq
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false          # you paste this in the Render dashboard
      - key: FLASK_ENV
        value: production
